name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      NODE_ENV: test
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vaultify_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/vaultify_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret-key-not-for-production-use
      FRONTEND_URL: http://localhost:3000
      NPM_CONFIG_YES: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Lint
        run: pnpm lint

      - name: Build API
        run: pnpm --filter @vaultify/api build

      - name: Build Web
        run: pnpm --filter @vaultify/web build

      - name: Build CLI
        run: pnpm --filter @vaultify/cli build

      - name: Run API tests
        run: pnpm --filter @vaultify/api test

      - name: Run Web tests
        run: pnpm --filter @vaultify/web test
